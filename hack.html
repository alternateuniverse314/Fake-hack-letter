<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>remote shell - session 01</title>
  <style>
    :root {
      --page-bg: #020403;
      --terminal-bg: #060806;
      --terminal-bg-2: #0b100c;
      --terminal-border: #26352b;
      --title-bg: #151815;
      --title-fg: #a9b3aa;
      --text: #d8ddd8;
      --green: #8ef0a4;
      --green-soft: #6ecb84;
      --muted: #7e8c80;
      --warn: #f2c66d;
      --error: #ff8787;
      --blue: #83b7ff;
      --font: "Consolas", "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 0%, rgba(58, 91, 62, 0.16), transparent 34%),
        var(--page-bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
      overflow: hidden;
    }

    .terminal-window {
      width: min(980px, 100%);
      border: 1px solid var(--terminal-border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--terminal-bg);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.66),
        0 0 0 1px rgba(142, 240, 164, 0.04) inset;
    }

    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 36px;
      padding: 0 11px;
      background: linear-gradient(180deg, #1b1e1b, var(--title-bg));
      border-bottom: 1px solid var(--terminal-border);
      color: var(--title-fg);
      font-size: 13px;
      user-select: none;
    }

    .window-left,
    .window-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .window-buttons {
      display: flex;
      gap: 7px;
      flex: 0 0 auto;
    }

    .window-button {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.38);
    }

    .close {
      background: #ff5f57;
    }

    .minimize {
      background: #febc2e;
    }

    .zoom {
      background: #28c840;
    }

    .title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-light {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-soft);
      box-shadow: 0 0 10px rgba(142, 240, 164, 0.82);
    }

    .status-label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    #terminal {
      position: relative;
      height: min(76vh, 680px);
      min-height: 460px;
      overflow-y: auto;
      padding: 18px 20px 20px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 50%, transparent 50%) 0 0 / 100% 4px,
        var(--terminal-bg-2);
      color: var(--text);
      font-family: "Consolas", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      text-shadow: 0 0 9px rgba(142, 240, 164, 0.11);
      scrollbar-color: #38513e #0b100c;
    }

    #terminal .prompt {
      color: var(--green);
    }

    #terminal .cont {
      color: var(--blue);
    }

    #terminal .info {
      color: var(--muted);
    }

    #terminal .ok {
      color: var(--green-soft);
    }

    #terminal .warn {
      color: var(--warn);
    }

    #terminal .error {
      color: var(--error);
    }

    #terminal .code {
      color: #b8e7c1;
    }

    #terminal .reveal {
      margin-top: 8px;
      color: #f5f5f5;
      font-weight: 700;
    }

    #cursor {
      display: inline-block;
      width: 9px;
      height: 1.14em;
      margin-left: 2px;
      background: var(--green);
      vertical-align: -0.18em;
      animation: cursor-blink 0.92s steps(1, end) infinite;
      box-shadow: 0 0 8px rgba(142, 240, 164, 0.52);
    }

    @keyframes cursor-blink {
      50% {
        opacity: 0;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .terminal-window {
        border-radius: 6px;
      }

      .window-right {
        display: none;
      }

      .title {
        max-width: 62vw;
      }

      #terminal {
        height: 82vh;
        min-height: 360px;
        padding: 14px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="terminal-window" aria-label="remote shell">
    <div class="title-bar">
      <div class="window-left">
        <div class="window-buttons" aria-hidden="true">
          <span class="window-button close"></span>
          <span class="window-button minimize"></span>
          <span class="window-button zoom"></span>
        </div>
        <div class="title">remote shell - session 01</div>
      </div>
      <div class="window-right" aria-hidden="true">
        <span class="status-light"></span>
        <span class="status-label">tty0 / secure console</span>
      </div>
    </div>

    <div id="terminal" role="log" aria-live="polite"></div>
  </main>

  <script>
    const terminal = document.getElementById("terminal");
    const promptText = "user@pc:~$ ";
    const continuationText = "> ";

    function detectOS() {
      const userAgent = window.navigator.userAgent || "";
      const platform = window.navigator.platform || "";
      const touchPoints = window.navigator.maxTouchPoints || 0;

      if (/iPad|iPhone|iPod/.test(userAgent) || (platform === "MacIntel" && touchPoints > 1)) {
        return "iOS / iPadOS";
      }

      if (/Macintosh|Mac OS X/.test(userAgent) || /^Mac/.test(platform)) {
        return "macOS";
      }

      if (/Android/.test(userAgent)) {
        return "Android";
      }

      if (/Windows NT/.test(userAgent) || /^Win/.test(platform)) {
        return "Windows";
      }

      if (/CrOS/.test(userAgent)) {
        return "ChromeOS";
      }

      if (/Linux/.test(userAgent) || /^Linux/.test(platform)) {
        return "Linux";
      }

      return "Unknown";
    }

    const detectedOS = detectOS();

    const timeline = [
      {
        input: ["whoami && date -u && printf 'Client OS: %s\\n' \"$CLIENT_OS\""],
        output: [
          "user",
          "Mon Jun  1 14:18:03 UTC 2026",
          `Client OS: ${detectedOS}`,
          "2026-06-01T14:18:03Z INFO  shell initialized on pts/0"
        ]
      },
      {
        input: ["ip route show && arp -an"],
        output: [
          "default via 192.0.2.1 dev wlan0 proto dhcp metric 600",
          "192.0.2.0/24 dev wlan0 proto kernel scope link src 192.0.2.22",
          "? (192.0.2.1) at 00:16:3e:4b:91:a2 [ether] on wlan0",
          "? (192.0.2.14) at 00:16:3e:21:cc:09 [ether] on wlan0",
          "2026-06-01T14:18:06Z INFO  local route table cached"
        ]
      },
      {
        input: ["ping -c 3 192.0.2.14"],
        output: [
          "PING 192.0.2.14 (192.0.2.14) 56(84) bytes of data.",
          "64 bytes from 192.0.2.14: icmp_seq=1 ttl=63 time=11.7 ms",
          "64 bytes from 192.0.2.14: icmp_seq=2 ttl=63 time=11.9 ms",
          "64 bytes from 192.0.2.14: icmp_seq=3 ttl=63 time=12.2 ms",
          "--- 192.0.2.14 ping statistics ---",
          "3 packets transmitted, 3 received, 0% packet loss, time 2004ms"
        ]
      },
      {
        input: ["nmap -Pn -sV --top-ports 40 192.0.2.14"],
        output: [
          "Starting Nmap 7.95 at 2026-06-01 14:18 UTC",
          "Nmap scan report for lab-gateway.local (192.0.2.14)",
          "Host is up (0.012s latency).",
          "PORT     STATE    SERVICE      VERSION",
          "22/tcp   open     ssh          OpenSSH 9.6p1",
          "80/tcp   closed   http",
          "443/tcp  open     ssl/http     nginx 1.24.0",
          "3306/tcp filtered mysql",
          "8080/tcp filtered http-proxy",
          "Service detection performed. 2 services recognized.",
          "2026-06-01T14:18:16Z WARN  scan policy limited to 40 common ports"
        ]
      },
      {
        input: ["mkdir -p /tmp/.session-cache && cat > /tmp/.session-cache/probe.py <<'PY'", "import base64, hashlib, json, time", "seed = 'lab-gateway.local:443:session-01'", "digest = hashlib.sha256(seed.encode()).hexdigest()", "print(json.dumps({", "    'target': '192.0.2.14',", "    'port': 443,", "    'fingerprint': digest[:32],", "    'nonce': base64.b16encode(digest.encode())[:24].decode(),", "    'checked_at': int(time.time())", "}, indent=2))", "PY"],
        output: [
          "2026-06-01T14:18:19Z INFO  wrote probe script to /tmp/.session-cache/probe.py",
          "2026-06-01T14:18:19Z INFO  permissions set: rw-------"
        ]
      },
      {
        input: ["python3 /tmp/.session-cache/probe.py"],
        output: [
          "{",
          "  \"target\": \"192.0.2.14\",",
          "  \"port\": 443,",
          "  \"fingerprint\": \"8d5e9ef4a780bd7cd34a251f5d4c7f33\",",
          "  \"nonce\": \"386435653965663461373830\",",
          "  \"checked_at\": 1780323501",
          "}",
          "2026-06-01T14:18:22Z OK    probe completed"
        ]
      },
      {
        input: ["ssh -o BatchMode=yes analyst@192.0.2.14 'id && uptime'"],
        output: [
          "analyst@192.0.2.14: Permission denied (publickey).",
          "2026-06-01T14:18:25Z ERROR ssh handshake failed: no accepted key"
        ]
      },
      {
        input: ["cat > /tmp/.session-cache/collector.sh <<'SH'", "#!/usr/bin/env bash", "set -euo pipefail", "target=\"192.0.2.14\"", "ports=(22 80 443 8080)", "for port in \"${ports[@]}\"; do", "  printf '%s port=%s state=' \"$target\" \"$port\"", "  case \"$port\" in", "    22|443) echo open;;", "    80) echo closed;;", "    *) echo filtered;;", "  esac", "done", "SH"],
        output: [
          "2026-06-01T14:18:29Z INFO  collector staged",
          "2026-06-01T14:18:29Z INFO  chmod +x /tmp/.session-cache/collector.sh"
        ]
      },
      {
        input: ["bash /tmp/.session-cache/collector.sh | tee /tmp/.session-cache/ports.log"],
        output: [
          "192.0.2.14 port=22 state=open",
          "192.0.2.14 port=80 state=closed",
          "192.0.2.14 port=443 state=open",
          "192.0.2.14 port=8080 state=filtered",
          "2026-06-01T14:18:33Z OK    wrote /tmp/.session-cache/ports.log"
        ]
      },
      {
        input: ["tail -n 6 /var/log/auth.log"],
        output: [
          "2026-06-01T14:18:34Z sshd[2219]: Failed publickey for analyst from 192.0.2.22 port 51730 ssh2",
          "2026-06-01T14:18:35Z sshd[2221]: Connection closed by authenticating user analyst 192.0.2.22 port 51730",
          "2026-06-01T14:18:37Z sudo[2232]: user : TTY=pts/0 ; PWD=/home/user ; COMMAND=/usr/bin/journalctl",
          "2026-06-01T14:18:39Z kernel: audit: type=1400 apparmor=\"DENIED\" operation=\"open\" profile=\"snap-confine\"",
          "2026-06-01T14:18:41Z sshd[2240]: Connection refused from 203.0.113.19 port 55214",
          "2026-06-01T14:18:42Z INFO  auth log read window closed"
        ]
      },
      {
        input: ["journalctl -u ssh --since '2 minutes ago' --no-pager"],
        output: [
          "Jun 01 14:18:25 workstation-07 ssh[2207]: analyst@192.0.2.14: Permission denied (publickey).",
          "Jun 01 14:18:26 workstation-07 ssh[2207]: Connection closed.",
          "Jun 01 14:18:42 workstation-07 systemd[1]: ssh.service: Deactivated successfully.",
          "2026-06-01T14:18:45Z WARN  insufficient privileges for extended journal fields"
        ]
      },
      {
        input: ["openssl s_client -connect 192.0.2.14:443 -servername lab-gateway.local </dev/null"],
        output: [
          "CONNECTED(00000003)",
          "depth=0 CN = lab-gateway.local",
          "verify error:num=18:self-signed certificate",
          "verify return:1",
          "SSL-Session:",
          "    Protocol  : TLSv1.3",
          "    Cipher    : TLS_AES_256_GCM_SHA384",
          "    Verify return code: 18 (self-signed certificate)",
          "2026-06-01T14:18:51Z WARN  certificate chain could not be verified"
        ]
      },
      {
        input: ["rm -r /tmp/.session-cache && exit"],
        output: [
          "2026-06-01T14:18:56Z INFO  temporary workspace removed",
          "logout",
          "Connection to lab-gateway.local closed.",
          "",
          "This was fake. It was only a local HTML animation.",
          "No commands ran, no network requests were made, and nothing on this device was changed."
        ],
        reveal: true
      }
    ];

    let activeLine = null;
    let activeText = null;
    let cursor = null;

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function randomDelay(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function scrollToBottom() {
      terminal.scrollTop = terminal.scrollHeight;
    }

    function appendLine(text = "", className = "") {
      const line = document.createElement("div");
      if (className) {
        line.className = className;
      }
      line.textContent = text;
      terminal.appendChild(line);
      scrollToBottom();
      return line;
    }

    function outputClass(text, reveal = false) {
      if (reveal) {
        return "reveal";
      }

      if (text.includes("ERROR") || text.includes("Permission denied") || text.includes("DENIED")) {
        return "error";
      }

      if (text.includes("WARN") || text.includes("filtered") || text.includes("self-signed")) {
        return "warn";
      }

      if (text.includes("OK")) {
        return "ok";
      }

      if (text.includes("INFO")) {
        return "info";
      }

      if (/^(import|seed|digest|print|target=|ports=|for |  |done|set |#|PY|SH)/.test(text)) {
        return "code";
      }

      return "";
    }

    function createInputLine(prefix) {
      activeLine = document.createElement("div");

      const prompt = document.createElement("span");
      prompt.className = prefix === promptText ? "prompt" : "cont";
      prompt.textContent = prefix;

      activeText = document.createElement("span");
      cursor = document.createElement("span");
      cursor.id = "cursor";
      cursor.setAttribute("aria-hidden", "true");

      activeLine.append(prompt, activeText, cursor);
      terminal.appendChild(activeLine);
      scrollToBottom();
    }

    async function typeInput(text, prefix = promptText) {
      createInputLine(prefix);
      const isCodeInput = prefix !== promptText;

      for (let index = 1; index <= text.length; index += 1) {
        activeText.textContent = text.slice(0, index);
        scrollToBottom();
        await wait(isCodeInput ? randomDelay(2, 9) : randomDelay(7, 24));
      }

      activeLine.textContent = prefix + text;
      activeLine = null;
      activeText = null;
      cursor = null;
      scrollToBottom();
      await wait(isCodeInput ? randomDelay(18, 70) : randomDelay(70, 180));
    }

    async function typeInputs(lines) {
      for (let index = 0; index < lines.length; index += 1) {
        await typeInput(lines[index], index === 0 ? promptText : continuationText);
      }
    }

    async function streamOutput(lines, reveal = false) {
      for (const line of lines) {
        appendLine(line, outputClass(line, reveal && line !== ""));
        await wait(randomDelay(70, 260));
      }
    }

    async function runTimeline() {
      await wait(450);

      for (const step of timeline) {
        await typeInputs(step.input);
        await streamOutput(step.output, Boolean(step.reveal));
        await wait(randomDelay(220, 520));
      }
    }

    runTimeline();
  </script>
</body>
</html>
